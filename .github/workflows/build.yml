name: Build NVDA Add-on

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Build Add-on
        run: python build.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: voiceSpeedManager-addon
          path: voiceSpeedManager.nvda-addon
